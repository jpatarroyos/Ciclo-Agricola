{% extends "base.html" %}
{% load static %}


{% block content %}
<div class="min-h-screen flex items-center justify-center bg-blue-180">
  <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
    
    <!-- Logo arriba -->
    <div class="flex justify-center mb-6">
      <img src="{% static 'img/logo_agricola.png' %}" alt="Logo CicloAgricola" class="h-16">
    </div>

    <h1 class="text-2xl font-bold text-center text-blue-800 mb-6">Iniciar Sesión</h1>

    {% if error %}
      <div class="bg-red-100 text-red-700 p-2 rounded mb-4">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700">Usuario</label>
        <input type="text" name="username" id="username"
               class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
        <input type="password" name="password" id="password"
               class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
      <button type="submit"
              class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-4 rounded">
        Entrar
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      © {{ year }} Proyecto Comunitario
    </p>
  </div>
</div>
{% endblock %}
