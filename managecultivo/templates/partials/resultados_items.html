<tbody id="resultadosItems">
  {% for it in resultados %}
  <tr>
    <td>{{ it.codigo }}</td>
    <td>{{ it.nombre }}</td>
    <td>{{ it.tipo }}</td>
    <td>{{ it.precio }}</td>
    <td>{{ it.iva }}%</td>
    <td>
      <button type="button"
              onclick="seleccionarItem('{{ it.pk }}','{{ it.nombre }}','{{ it.precio }}','{{ it.iva }}')"
              class="bg-green-600 text-white px-2 py-1 rounded">
        Agregar
      </button>
    </td>
  </tr>
  {% empty %}
  <tr>
    <td colspan="6" class="text-center text-gray-500">No se encontraron productos</td>
  </tr>
  {% endfor %}
</tbody>
